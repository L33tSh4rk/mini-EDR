# configuracao do redis (broker unico)

# escuta em todas as interfaces da rede do container
bind 0.0.0.0
# sem auth criptografica entre componentes
protected-mode no
# porta padrao do redis
port 6379

# habilita persistencia append-only
appendonly yes
# flush do log de forma assincrona uma vez por segundo
appendfsync everysec
# nome do arquivo append-only
appendfilename "appendonly.aof"

# desativa snapshots rdb, usa aof exclusivamente
save ""

# diretorio de persistencia (mapeado para volume docker)
dir /data

# nao descarta itens da fila silenciosamente quando memoria encher
maxmemory-policy noeviction
